name: CI

on:
  push:
    branches: ["main", "master", "Develop"]
  pull_request:
    branches: ["main", "master", "Develop"]

jobs:
  python-tests:
    name: Python tests (pytest)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Fail on UTF-8 BOM in scripts/tests Python files
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $bomFiles = @()
          Get-ChildItem scripts,tests -Filter *.py -Recurse | ForEach-Object {
            $bytes = Get-Content -LiteralPath $_.FullName -AsByteStream -TotalCount 3
            if ($bytes.Length -ge 3 -and $bytes[0] -eq 0xEF -and $bytes[1] -eq 0xBB -and $bytes[2] -eq 0xBF) {
              $bomFiles += $_.FullName
            }
          }
          if ($bomFiles.Count -gt 0) {
            Write-Error ("UTF-8 BOM detected:`n" + ($bomFiles -join "`n"))
          }

      - name: Verify UTF-8 encoding (scripts/tests/docs)
        run: python scripts/verify_encoding.py

      - name: Run tests
        run: pytest --tb=short -q
        working-directory: ${{ github.workspace }}

      - name: Hardening fault-injection gate
        run: >
          pytest tests/test_tool_manifest_contract.py
          tests/test_tool_call_authorization.py
          tests/test_project_cache_generation.py
          tests/test_atomic_io.py
          tests/test_mcp_envelope.py
          tests/test_mcp_stable_subprocess_e2e.py
          tests/test_installer_gates.py
          -q --tb=short
        working-directory: ${{ github.workspace }}

      - name: Domain contract gate
        run: python scripts/eval_domain_contract.py --pytest-only

      - name: Repetition gate
        run: python scripts/run_repetition_gate.py --repeat 3

  python-lint:
    name: Python lint (ruff)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: python -m pip install ruff

      - name: Lint scripts/ and tests/
        run: ruff check scripts/ tests/ --select=E,F,W --ignore=E501,E402,F401

  node-install:
    name: Node.js npm install
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: npm install (lmstudio-unreal-agent-mcp)
        run: npm.cmd ci --no-fund --no-audit
        working-directory: lmstudio-unreal-agent-mcp
        continue-on-error: false

      - name: Node syntax check (all src JS)
        run: |
          Get-ChildItem -Path src -Filter *.js -Recurse | ForEach-Object {
            Write-Host "Checking $($_.FullName)"
            node --check $_.FullName
          }
        shell: pwsh
        working-directory: lmstudio-unreal-agent-mcp

      - name: npm test
        run: npm.cmd test
        working-directory: lmstudio-unreal-agent-mcp

  oss-ready:
    name: OSS readiness check
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Verify no personal paths or forbidden content
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          powershell -NoProfile -ExecutionPolicy Bypass -File installer\Verify-Oss-Ready.ps1

  installer-gates:
    name: Installer verify and WhatIf
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Repo layout verify
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          powershell -NoProfile -ExecutionPolicy Bypass -File installer\Verify-UnrealMcp.ps1 -RepoOnly

      - name: Cline install WhatIf
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          powershell -NoProfile -ExecutionPolicy Bypass -File installer\Install-ClineUnrealMcp.ps1 -WhatIf

      - name: Main install WhatIf
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          powershell -NoProfile -ExecutionPolicy Bypass -File installer\Install-UnrealMcp.ps1 -WhatIf -SkipNpm -SkipPythonDeps

      - name: Portable package build and content scan
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $out = Join-Path $env:TEMP ('Unreal58-RAG-Portable-CI-' + [guid]::NewGuid().ToString('n'))
          $zip = Join-Path $env:TEMP ('Unreal58-RAG-Portable-CI-' + [guid]::NewGuid().ToString('n') + '.zip')
          powershell -NoProfile -ExecutionPolicy Bypass -File installer\Build-PortablePackage.ps1 -OutputDir $out -ZipPath $zip -SourceRoot $PWD
          powershell -NoProfile -ExecutionPolicy Bypass -File installer\Test-PortablePackageContents.ps1 -ZipPath $zip
