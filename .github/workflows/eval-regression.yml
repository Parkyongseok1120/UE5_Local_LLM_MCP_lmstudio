name: eval-regression

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  tier-a-regression:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run Tier-A eval regression
        shell: pwsh
        run: |
          python scripts/run_eval_regression.py --skip-pytest
        continue-on-error: false
